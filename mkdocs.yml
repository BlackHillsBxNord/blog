site_name: Zer0droid
site_description: Offensive security. Research. Tools. Whatever else catches my attention.
site_author: Zer0droid
site_url: https://blackhillsbxnord.github.io/blog

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: deep orange
  font:
    text: JetBrains Mono
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search
  - tags:
      tags_file: tags.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Offensive Security: offensive-security/index.md
  - Tooling: tooling/index.md
  - OPSEC: opsec/index.md
  - Psychology: psychology/index.md
  - Research: research/index.md
  - Tags: tags.md
